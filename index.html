<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngreAr - Acceso Autorizado</title>
	    <style>
        /* --- ESTILOS GENERALES Y VARIABLES (Estilo Arcor) --- */
        :root {
            --color-principal: #0d47a1; /* Azul institucional profundo */
            --color-secundario: #1565c0; /* Azul intermedio para inputs */
            --color-acento: #00b0ff; /* Celeste brillante estilo Arcor */
            --color-texto: #ffffff;
            --color-texto-oscuro: #333333;
            --color-fondo-login: #0a2540; /* Fondo azul noche muy oscuro */
            --fuente: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--fuente);
            background-color: var(--color-fondo-login);
            color: var(--color-texto);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- CONTENEDOR CENTRAL DE LOGIN --- */
        .login-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .login-card {
            background-color: var(--color-principal);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
            border-top: 4px solid var(--color-acento);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .logo span {
            color: var(--color-acento);
        }

        .login-header p {
            color: #90caf9; /* Celeste claro suavizado */
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* --- FORMULARIO E INPUTS --- */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #bbdefb;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background-color: var(--color-secundario);
            border: 1px solid #1976d2;
            border-radius: 4px;
            color: var(--color-texto);
            font-family: var(--fuente);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--color-acento);
            box-shadow: 0 0 8px rgba(0, 176, 255, 0.4);
        }

        /* --- OPCIONES ADICIONALES --- */
        .login-opciones {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        .recordar-me {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            color: #bbdefb;
        }

        .recordar-me input {
            accent-color: var(--color-acento);
        }

        .olvido-pass {
            color: #bbdefb;
            text-decoration: none;
            transition: color 0.2s;
        }

        .olvido-pass:hover {
            color: var(--color-acento);
        }

        /* --- BOTÓN DE ACCESO --- */
        .btn-ingresar {
            width: 100%;
            background-color: var(--color-acento);
            color: #0d47a1; /* Texto azul oscuro para contraste legible */
            border: none;
            padding: 0.9rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-ingresar:hover {
            background-color: #40c4ff;
        }

        .btn-ingresar:active {
            transform: scale(0.98);
        }

        /* --- ADVERTENCIA DE SEGURIDAD --- */
        .aviso-seguridad {
            margin-top: 1.5rem;
            background-color: rgba(0, 176, 255, 0.05);
            border: 1px dashed rgba(0, 176, 255, 0.3);
            padding: 0.75rem;
            border-radius: 4px;
            text-align: center;
        }

        .aviso-seguridad p {
            font-size: 0.75rem;
            color: var(--color-acento);
            line-height: 1.3;
        }

        /* --- FOOTER --- */
        footer {
            background-color: rgba(0, 0, 0, 0.3);
            text-align: center;
            padding: 1.2rem;
            font-size: 0.85rem;
            border-top: 1px solid #0d47a1;
        }

        footer p {
            color: #4fc3f7;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- Contenedor del Login -->
    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <div class="logo">IngreAr</div>
                <p>Control de Operaciones</p>
            </div>

            <form onsubmit="return false;">
                <!-- Usuario o Legajo -->
                <div class="form-group">
                    <label for="usuario">Usuario o Legajo</label>
                    <input type="text" id="usuario" placeholder="Ej: 500005" required autocomplete="username">
                </div>

                <!-- Contraseña -->
                <div class="form-group">
                    <label for="password">Contraseña de Red</label>
                    <input type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password">
                </div>

                <!-- Recordar y Olvido -->
                <div class="login-opciones">
                    <label class="recordar-me">
                        <input type="checkbox" id="remember">
                        <span>Recordar sesión</span>
                    </label>
                    <a href="#" class="olvido-pass">¿Olvidó su clave?</a>
                </div>

                <!-- Botón -->
                <a href= "index2.html"><button type="button" class="btn-ingresar">Iniciar Sesión</button></a>
            </form>

            <!-- Cláusula de Seguridad -->
            <div class="aviso-seguridad">
                <p><strong>SISTEMA RESTRINGIDO</strong><br>El ingreso no autorizado infringe las normativas de seguridad informática de la compañía y será auditado.</p>
            </div>

        </div>
    </div>

    <!-- Pie de página integrado al fondo -->
    <footer>
        <p>&copy; 2026 IngreAr S.R.L. - Terminales y Almacenes de Alta Densidad.</p>
    </footer>

</body>
</html>
